<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.id == null} ? 'Nuevo producto' : 'Editar producto'">Producto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a href="/?nombre=Estudiante">Inicio</a>
            </li>
            <li class="breadcrumb-item">
                <a href="/productos">Productos</a>
            </li>
            <li class="breadcrumb-item active"
                th:text="${producto.id == null} ? 'Nuevo producto' : 'Editar producto'">
                Formulario
            </li>
        </ol>
    </nav>

    <div class="card border-0 shadow">
        <div class="card-header brand-bg">
            <h2 class="mb-0" th:text="${producto.id == null} ? 'Nuevo producto' : 'Editar producto'">
                Formulario de producto
            </h2>
        </div>
        <div class="card-body">

            <form th:object="${producto}"
                  method="post"
                  th:action="${producto.id == null} ? @{/productos} : @{'/productos/' + ${producto.id}}">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" id="nombre" class="form-control"
                           th:field="*{nombre}" th:errorclass="is-invalid">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('nombre')}"
                         th:errors="*{nombre}"></div>
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripcion</label>
                    <textarea id="descripcion" class="form-control" rows="3"
                              th:field="*{descripcion}" th:errorclass="is-invalid"></textarea>
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('descripcion')}"
                         th:errors="*{descripcion}"></div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="precio" class="form-label">Precio</label>
                        <input type="number" id="precio" class="form-control"
                               step="0.01" min="0"
                               th:field="*{precio}" th:errorclass="is-invalid">
                        <div class="invalid-feedback d-block"
                             th:if="${#fields.hasErrors('precio')}"
                             th:errors="*{precio}"></div>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="stock" class="form-label">Stock</label>
                        <input type="number" id="stock" class="form-control"
                               step="1" min="0"
                               th:field="*{stock}" th:errorclass="is-invalid">
                        <div class="invalid-feedback d-block"
                             th:if="${#fields.hasErrors('stock')}"
                             th:errors="*{stock}"></div>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="categoria" class="form-label">Categoria</label>
                        <input type="text" id="categoria" class="form-control"
                               th:field="*{categoria}" th:errorclass="is-invalid">
                        <div class="invalid-feedback d-block"
                             th:if="${#fields.hasErrors('categoria')}"
                             th:errors="*{categoria}"></div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i>Guardar
                    </button>
                    <a class="btn btn-secondary" href="/productos">Cancelar</a>
                </div>

            </form>

        </div>
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
