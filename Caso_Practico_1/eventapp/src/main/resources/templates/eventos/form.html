<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento.id == null} ? 'Nuevo evento | EventApp' : 'Editar evento | EventApp'">Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4" style="max-width: 720px;">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/eventos}">Eventos</a></li>
            <li class="breadcrumb-item active" th:text="${evento.id == null} ? 'Nuevo' : 'Editar'">Form</li>
        </ol>
    </nav>

    <h1 class="h3 mb-4" th:text="${evento.id == null} ? 'Nuevo evento' : 'Editar evento'">Formulario</h1>

    <form th:object="${evento}"
          th:action="${evento.id == null} ? @{/eventos} : @{/eventos/{id}(id=${evento.id})}"
          method="post" novalidate>

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label" for="nombre">Nombre</label>
            <input type="text" class="form-control" id="nombre" th:field="*{nombre}"
                   th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="descripcion">Descripcion</label>
            <textarea class="form-control" id="descripcion" rows="3" th:field="*{descripcion}"
                      th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="fecha">Fecha</label>
                <input type="date" class="form-control" id="fecha" th:field="*{fecha}"
                       th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" for="lugar">Lugar</label>
                <input type="text" class="form-control" id="lugar" th:field="*{lugar}"
                       th:classappend="${#fields.hasErrors('lugar')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('lugar')}" th:errors="*{lugar}"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label" for="categoria">Categoria</label>
                <input type="text" class="form-control" id="categoria" th:field="*{categoria}"
                       th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label" for="organizador">Organizador</label>
                <input type="text" class="form-control" id="organizador" th:field="*{organizador}"
                       th:classappend="${#fields.hasErrors('organizador')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('organizador')}" th:errors="*{organizador}"></div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label" for="cupoMaximo">Cupo maximo</label>
                <input type="number" class="form-control" id="cupoMaximo" th:field="*{cupoMaximo}"
                       th:classappend="${#fields.hasErrors('cupoMaximo')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('cupoMaximo')}" th:errors="*{cupoMaximo}"></div>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label" for="cuposVendidos">Cupos vendidos</label>
                <input type="number" class="form-control" id="cuposVendidos" th:field="*{cuposVendidos}"
                       th:classappend="${#fields.hasErrors('cuposVendidos')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('cuposVendidos')}" th:errors="*{cuposVendidos}"></div>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label" for="precio">Precio (CRC)</label>
                <input type="number" step="0.01" class="form-control" id="precio" th:field="*{precio}"
                       th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <a th:href="@{/eventos}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
    </form>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
